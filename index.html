<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Volts Up</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0F0C;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    background: #121815;
    border: 1px solid #3DDC8440;
    border-radius: 20px;
    padding: 36px 32px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .divider {
    width: 32px;
    height: 1px;
    background: #ffffff20;
    margin: 0 auto 24px;
  }
  .status-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 26px;
    font-weight: 700;
    color: #0A0F0C;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
  p { font-size: 15px; color: #9BA69F; line-height: 1.5; }
  .footer { margin-top: 24px; font-size: 12px; color: #5F6B62; }
</style>
</head>
<body>
  <div class="card" id="card">
    <img src="ChatGPT_Image_Jul_7_2026_01_14_15_PM.png" alt="Volts Up" class="logo" />
    <div class="divider"></div>
    <div class="status-circle" id="statusCircle">…</div>
    <h1 id="title">Loading…</h1>
    <p id="message"></p>
    <div class="footer">Volts Up — you can close this tab</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get("status");
    const name = params.get("name");
    const message = params.get("message");
    const kind = params.get("kind") === "note" ? "Note" : "Charger";

    const circleEl = document.getElementById("statusCircle");
    const titleEl = document.getElementById("title");
    const messageEl = document.getElementById("message");
    const cardEl = document.getElementById("card");

    let symbol = "✓", title = "Done", text = "", accent = "#3DDC84";

    if (status === "approved") {
      symbol = "✓"; title = `${kind} Approved`;
      const liveText = kind === "Note" ? "is now visible to other users." : "is now live on the map for everyone.";
      text = name ? `"${name}" ${liveText}` : `The ${kind.toLowerCase()} is now live.`;
      accent = "#3DDC84";
    } else if (status === "rejected") {
      symbol = "✕"; title = `${kind} Rejected`;
      text = name ? `"${name}" has been rejected and will stay hidden.` : `The ${kind.toLowerCase()} has been rejected.`;
      accent = "#E8544B";
    } else if (status === "unauthorized") {
      symbol = "!"; title = "Not Authorized";
      text = "This link isn't valid.";
      accent = "#E8544B";
    } else {
      symbol = "!"; title = "Something Went Wrong";
      text = message || "An unexpected error occurred.";
      accent = "#E8544B";
    }

    circleEl.textContent = symbol;
    circleEl.style.background = accent;
    titleEl.textContent = title;
    titleEl.style.color = accent;
    messageEl.textContent = text;
    cardEl.style.borderColor = accent + "40";
  </script>
</body>
</html>
