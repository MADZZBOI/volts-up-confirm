<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Charge Nomad Admin</title>
<style>
  :root {
    --bg: #0A0F0C; --surface: #10160F12; --card: #121815; --elevated: #1A211D;
    --border: #222B25; --border2: #2C372F;
    --text: #F2F6F3; --text2: #A7B3AB; --text3: #66736A;
    --accent: #3DDC84; --accent-dim: rgba(61,220,132,.12);
    --warn: #E8B84B; --warn-dim: rgba(232,184,75,.12);
    --danger: #F0655D; --danger-dim: rgba(232,84,75,.12);
    --blue: #5BA8F5; --blue-dim: rgba(91,168,245,.12);
    --pink: #E87BC9; --pink-dim: rgba(232,123,201,.12);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background:
      radial-gradient(1200px 500px at 50% -200px, rgba(61,220,132,.07), transparent 70%),
      var(--bg);
    color: var(--text);
    font: 15px/1.55 -apple-system, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }
  button { font: inherit; cursor: pointer; border: none; border-radius: 10px; transition: filter .15s, background .15s, transform .05s; }
  button:active { transform: scale(.97); }

  /* ── Header ─────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px clamp(16px, 4vw, 28px);
    background: rgba(10,15,12,.82); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 5;
  }
  header img { width: 36px; height: 36px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.4); }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.01em; }
  header h1 span { color: var(--accent); }
  header .spacer { flex: 1; }
  #refreshBtn, #logout { background: var(--elevated); color: var(--text2); padding: 8px 14px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); }
  #refreshBtn:hover, #logout:hover { color: var(--text); border-color: var(--border2); }

  /* ── Nav ────────────────────────────────────────────── */
  nav {
    display: flex; gap: 8px; padding: 16px clamp(16px, 4vw, 28px) 0;
    max-width: 1040px; margin: 0 auto; flex-wrap: wrap;
  }
  nav button {
    background: transparent; color: var(--text3); padding: 9px 18px;
    font-weight: 600; font-size: 14px; border: 1px solid transparent; border-radius: 99px;
  }
  nav button:hover { color: var(--text2); background: var(--elevated); }
  nav button.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(61,220,132,.25); }
  nav button .badge {
    background: var(--danger); color: #fff; border-radius: 99px;
    padding: 1px 7px; font-size: 11px; font-weight: 700; margin-left: 6px; vertical-align: 1px;
  }

  main { padding: 20px clamp(16px, 4vw, 28px) 80px; max-width: 1040px; margin: 0 auto; }

  /* ── Stats ──────────────────────────────────────────── */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat {
    background: linear-gradient(160deg, var(--elevated), var(--card));
    border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px;
    transition: transform .12s, border-color .15s;
  }
  .stat .n { font-size: 28px; font-weight: 800; letter-spacing: -.02em; color: var(--accent); }
  .stat .l { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
  .stat .ic { font-size: 18px; margin-bottom: 6px; }
  .stat.click { cursor: pointer; }
  .stat.click:hover { transform: translateY(-2px); }
  .stat.green  { border-top: 3px solid var(--accent); }  .stat.green .n  { color: var(--accent); }
  .stat.blue   { border-top: 3px solid var(--blue); }    .stat.blue .n   { color: var(--blue); }
  .stat.amber  { border-top: 3px solid var(--warn); }    .stat.amber .n  { color: var(--warn); }
  .stat.pink   { border-top: 3px solid var(--pink); }    .stat.pink .n   { color: var(--pink); }

  .hero { margin: 8px 0 20px; }
  .hero h1 {
    font-size: clamp(24px, 5vw, 32px); font-weight: 800; letter-spacing: -.02em;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero p { color: var(--text3); font-size: 14px; margin-top: 4px; }

  /* Split-view ticket workspace */
  .split { display: flex; gap: 16px; align-items: flex-start; }
  .ticket-left { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
  .ticket-list { max-height: calc(100vh - 320px); overflow-y: auto; padding-right: 4px; }
  .ticket-list .card { margin-bottom: 8px; }
  .card.sel { border-color: rgba(61,220,132,.5); background: linear-gradient(160deg, var(--accent-dim), var(--card)); }
  .ticket-pane {
    flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    position: sticky; top: 76px; height: calc(100vh - 180px);
  }
  .convo-head {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    background: var(--elevated); border-bottom: 1px solid var(--border);
  }
  .convo-head h2 { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .convo-msgs { flex: 1; overflow-y: auto; padding: 16px; }
  .convo-actions {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .convo-actions input { width: auto; }
  .convo-compose {
    display: flex; gap: 8px; align-items: flex-end; padding: 12px 16px;
    border-top: 1px solid var(--border); background: var(--surface);
  }
  .convo-compose textarea { flex: 1; resize: vertical; min-height: 42px; }
  .convo-compose .send { background: linear-gradient(135deg, var(--accent), #2BB86A); color: #06130B; padding: 11px 22px; font-weight: 700; }
  .convo-head .back { display: none; }
  @media (max-width: 900px) {
    .split { display: block; }
    .ticket-left { width: 100%; }
    .ticket-list { max-height: none; }
    .ticket-pane { display: none; position: fixed; inset: 0; z-index: 9; height: auto; border-radius: 0; border: none; }
    .ticket-pane.open { display: flex; }
    .convo-head .back { display: inline-block; }
  }

  /* ── Cards ──────────────────────────────────────────── */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; margin-bottom: 12px; transition: border-color .15s;
  }
  .card:hover { border-color: var(--border2); }
  .card .summary { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
  .card .summary .chev { color: var(--text3); font-size: 12px; transition: transform .15s; flex-shrink: 0; }
  .card.open .summary .chev { transform: rotate(90deg); }
  .card .summary .sub { font-size: 13px; color: var(--text3); margin-top: 1px; }
  .card .summary .grow { flex: 1; min-width: 0; }
  .card .summary .grow h3 { margin: 0; }
  .card .summary .sub, .card .summary .grow h3 { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .card .details { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card.open .details { display: block; }
  .card .quick { display: flex; gap: 8px; flex-shrink: 0; }
  .card h3 { font-size: 15px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card .meta { font-size: 12px; color: var(--text3); margin-bottom: 10px; font-variant-numeric: tabular-nums; }
  .card .body { color: var(--text2); font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .kvgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 4px 16px; margin-top: 10px; }
  .kv { font-size: 13px; color: var(--text2); overflow-wrap: anywhere; }
  .kv b { color: var(--text3); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; display: block; }

  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
  .approve { background: var(--accent); color: #06130B; padding: 9px 18px; font-weight: 700; font-size: 13px; }
  .approve:hover { filter: brightness(1.1); }
  .reject, .delete { background: var(--danger-dim); color: var(--danger); padding: 9px 18px; font-weight: 700; font-size: 13px; border: 1px solid rgba(232,84,75,.2); }
  .reject:hover, .delete:hover { background: rgba(232,84,75,.22); }
  .neutral { background: var(--elevated); color: var(--text2); padding: 9px 16px; font-weight: 600; font-size: 13px; border: 1px solid var(--border); }
  .neutral:hover { color: var(--text); border-color: var(--border2); }
  a.neutral { text-decoration: none; border-radius: 10px; }

  .pill { display: inline-block; border-radius: 99px; padding: 2px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
  .pill.open, .pill.pending { background: var(--warn-dim); color: var(--warn); }
  .pill.in_progress, .pill.approved { background: var(--accent-dim); color: var(--accent); }
  .pill.closed { background: var(--elevated); color: var(--text3); }
  .pill.rejected { background: var(--danger-dim); color: var(--danger); }

  input[type=text], input[type=password], textarea {
    background: var(--elevated); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 14px; font: inherit; width: 100%;
    transition: border-color .15s;
  }
  input:focus, textarea:focus { outline: none; border-color: rgba(61,220,132,.45); }
  input::placeholder { color: var(--text3); }

  /* Conversation thread */
  .thread { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .thread.open { display: block; }
  .bubble { max-width: 82%; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; white-space: pre-wrap; word-break: break-word; color: var(--text2); }
  .bubble.user { background: var(--elevated); margin-right: auto; }
  .bubble.admin { background: var(--accent-dim); border: 1px solid rgba(61,220,132,.2); margin-left: auto; color: var(--text); }
  .bubble .who { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 3px; }

  /* Daily checklist */
  label.check { display: flex; align-items: center; gap: 12px; padding: 9px 4px; cursor: pointer; font-size: 14px; color: var(--text2); }
  label.check input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  label.check.done span { text-decoration: line-through; color: var(--text3); }
  .rowlink:hover { border-color: rgba(61,220,132,.3); }

  select.tpl {
    background: var(--elevated); color: var(--text2); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 12px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  select.tpl:hover { color: var(--text); border-color: var(--border2); }

  .searchrow { display: flex; gap: 10px; margin-bottom: 20px; }
  .searchrow input { flex: 1; }
  .searchrow button { background: var(--accent); color: #06130B; padding: 0 22px; font-weight: 700; }
  .searchrow button:hover { filter: brightness(1.1); }

  .empty { color: var(--text3); text-align: center; padding: 48px 0; font-size: 14px; }
  .empty.err { color: var(--danger); }
  h2.section {
    font-size: 12px; text-transform: uppercase; letter-spacing: .1em; font-weight: 700;
    color: var(--text3); margin: 28px 0 12px; display: flex; align-items: center; gap: 10px;
  }
  h2.section::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* ── Table ──────────────────────────────────────────── */
  .tablewrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; background: var(--card); }
  th, td { text-align: left; padding: 11px 16px; font-size: 13px; white-space: nowrap; }
  th { color: var(--text3); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; background: var(--elevated); position: sticky; top: 0; }
  td { color: var(--text2); border-top: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  tr:hover td { background: rgba(255,255,255,.015); }
  td.ok { color: var(--accent); }

  /* ── Login ──────────────────────────────────────────── */
  #login {
    position: fixed; inset: 0; z-index: 10;
    background:
      radial-gradient(900px 500px at 50% 20%, rgba(61,220,132,.08), transparent 70%),
      var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  #login .box {
    background: var(--card); border: 1px solid var(--border); border-radius: 24px;
    padding: 40px 36px; width: 360px; max-width: 100%; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
  }
  #login img { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 18px; box-shadow: 0 6px 24px rgba(61,220,132,.15); }
  #login h2 { font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 6px; }
  #login p { color: var(--text3); font-size: 13px; margin-bottom: 22px; }
  #login input { margin-bottom: 12px; text-align: center; }
  #login button { width: 100%; background: var(--accent); color: #06130B; padding: 12px; font-weight: 700; font-size: 15px; }
  #login button:hover { filter: brightness(1.1); }
  #loginErr { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--elevated); color: var(--text); padding: 11px 22px; border-radius: 12px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 20; border: 1px solid var(--border2);
    box-shadow: 0 10px 30px rgba(0,0,0,.5); white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <img src="https://madzzboi.github.io/charge-nomad-confirm/logo.png" alt="Charge Nomad">
    <h2>Charge Nomad Admin</h2>
    <p>Enter your moderation secret to continue.</p>
    <input type="password" id="secretInput" placeholder="••••••••" autocomplete="current-password">
    <button onclick="tryLogin()">Unlock</button>
    <div id="loginErr"></div>
  </div>
</div>

<header>
  <img src="https://madzzboi.github.io/charge-nomad-confirm/logo.png" alt="">
  <h1>Charge Nomad <span>Admin</span></h1>
  <div class="spacer"></div>
  <button id="refreshBtn" onclick="refreshAll(); toast('Refreshed')">Refresh</button>
  <button id="logout" onclick="logout()">Lock</button>
</header>

<nav>
  <button data-tab="home" class="active" onclick="showTab('home')">Home</button>
  <button data-tab="moderation" onclick="showTab('moderation')">Moderation <span class="badge" id="modBadge" style="display:none"></span></button>
  <button data-tab="tickets" onclick="showTab('tickets')">Tickets <span class="badge" id="ticketBadge" style="display:none"></span></button>
  <button data-tab="signups" onclick="showTab('signups')">Signups</button>
  <button data-tab="content" onclick="showTab('content')">Content</button>
</nav>

<main>
  <div id="tab-home"></div>
  <div id="tab-moderation" style="display:none"></div>
  <div id="tab-tickets" style="display:none">
    <div id="ticketStats"></div>
    <div class="split">
      <div class="ticket-left">
        <input type="text" id="ticketSearch" placeholder="🔎 Search tickets…" oninput="ticketFilter = this.value; renderTicketList()">
        <div class="ticket-list" id="ticketList"><div class="empty">Loading…</div></div>
      </div>
      <div class="ticket-pane" id="ticketPane">
        <div class="convo-head">
          <button class="neutral back" onclick="closeConvo()">←</button>
          <h2 id="convoTitle">Pick a ticket</h2>
          <span id="convoPill" class="pill" style="display:none"></span>
          <button class="neutral" onclick="loadConvo()">↻</button>
        </div>
        <div class="convo-actions" id="convoActions"></div>
        <div class="convo-msgs" id="convoMsgs"><div class="empty">Select a ticket on the left to read and reply 👈</div></div>
        <div class="convo-compose">
          <select class="tpl" id="convoTpl" onchange="applyConvoTemplate(this)">
            <option value="">📋 Templates…</option>
          </select>
          <textarea id="convoDraft" rows="2" placeholder="Type your reply…"></textarea>
          <button class="send" onclick="sendConvo()">Send</button>
        </div>
      </div>
    </div>
  </div>
  <div id="tab-signups" style="display:none"></div>
  <div id="tab-content" style="display:none">
    <div class="searchrow">
      <input type="text" id="contentQ" placeholder="Search notes and chargers…" onkeydown="if(event.key==='Enter')loadContent()">
      <button onclick="loadContent()">Search</button>
    </div>
    <div id="contentResults"></div>
  </div>
</main>

<div id="toast"></div>


<script>
const API = "https://rgkhknmscrenydxlrglf.supabase.co/functions/v1/admin-api";
const ANON = "sb_publishable_hxs2u-HAQ8WrXEi6LJDyMQ_VoIPGPHs";
let SECRET = sessionStorage.getItem("cn_admin_secret") || "";
let LAST_TICKETS = [];
let LAST_SIGNUPS = [];

async function api(action, extra = {}) {
  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": ANON, "Authorization": "Bearer " + ANON },
    body: JSON.stringify({ secret: SECRET, action, ...extra }),
  });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) { logout(); throw new Error("Unauthorized"); }
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove("show"), 2200);
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmtDate(s) {
  if (!s) return "";
  const d = new Date(s);
  return isNaN(d) ? esc(s) : d.toLocaleString("en-AU", { day: "numeric", month: "short", year: "numeric", hour: "numeric", minute: "2-digit" });
}
// Renders any row's remaining columns as key/value tiles, so unknown
// table schemas still display everything.
function kvBlock(row, skip) {
  const items = Object.entries(row)
    .filter(([k, v]) => !skip.includes(k) && v !== null && v !== "")
    .map(([k, v]) => `<div class="kv"><b>${esc(k.replace(/_/g, " "))}</b>${esc(typeof v === "object" ? JSON.stringify(v) : v)}</div>`)
    .join("");
  return items ? `<div class="kvgrid">${items}</div>` : "";
}

// ── Login ─────────────────────────────────────────────────────────────
async function tryLogin() {
  SECRET = document.getElementById("secretInput").value.trim();
  document.getElementById("loginErr").textContent = "";
  try {
    await api("tickets");
    sessionStorage.setItem("cn_admin_secret", SECRET);
    document.getElementById("login").style.display = "none";
    refreshAll();
  } catch {
    document.getElementById("loginErr").textContent = "Wrong secret, or the admin-api function isn't reachable.";
  }
}
function logout() {
  SECRET = "";
  sessionStorage.removeItem("cn_admin_secret");
  document.getElementById("login").style.display = "flex";
}
document.getElementById("secretInput").addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

// ── Tabs ──────────────────────────────────────────────────────────────
function showTab(name) {
  for (const b of document.querySelectorAll("nav button")) b.classList.toggle("active", b.dataset.tab === name);
  for (const id of ["home", "moderation", "tickets", "signups", "content"]) {
    document.getElementById("tab-" + id).style.display = id === name ? "" : "none";
  }
}
function refreshAll() { loadHome(); loadModeration(); loadTickets(); loadSignups(); loadContent(); }
function toggleCard(el) { el.parentElement.classList.toggle("open"); }

// ── Home dashboard ────────────────────────────────────────────────────
const CHECKLIST = [
  "Check Moderation for pending chargers and notes",
  "Reply to any open support tickets",
  "Open the app: map loads and charger search works",
  "Run a quick Trip Planner estimate to confirm it calculates",
  "Check Supabase Edge Function logs for errors",
  "Glance at new signups for anything unusual",
];
function checklistState() {
  const key = "cn_checklist_" + new Date().toISOString().slice(0, 10);
  let state = [];
  try { state = JSON.parse(localStorage.getItem(key)) || []; } catch {}
  return { key, state };
}
function toggleCheck(i) {
  const { key, state } = checklistState();
  state[i] = !state[i];
  localStorage.setItem(key, JSON.stringify(state));
  loadHomeChecklist();
}
let checklistOpen = false;
function toggleChecklist() { checklistOpen = !checklistOpen; loadHomeChecklist(); }
function loadHomeChecklist() {
  const el = document.getElementById("checklist");
  if (!el) return;
  const { state } = checklistState();
  const done = CHECKLIST.filter((_, i) => state[i]).length;
  const allDone = done === CHECKLIST.length;
  el.innerHTML = `
    <h2 class="section">Daily health check</h2>
    <div class="card">
      <div class="summary" onclick="toggleChecklist()">
        <span class="chev" style="transform:rotate(${checklistOpen ? 90 : 0}deg)">▶</span>
        <div class="grow"><h3 style="font-size:14px">${allDone ? "All done for today 🎉" : `${done} of ${CHECKLIST.length} checks done today`}</h3></div>
        <span class="pill ${allDone ? "approved" : "pending"}">${done}/${CHECKLIST.length}</span>
      </div>
      ${checklistOpen ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        ${CHECKLIST.map((item, i) => `
        <label class="check ${state[i] ? "done" : ""}">

// ── Tickets (split view) ──────────────────────────────────────────────
let ticketFilter = "";

async function loadTickets() {
  const list = document.getElementById("ticketList");
  try {
    const { tickets } = await api("tickets");
    LAST_TICKETS = tickets;
    const open = tickets.filter(t => t.status !== "closed");
    const badge = document.getElementById("ticketBadge");
    badge.style.display = open.length ? "" : "none";
    badge.textContent = open.length;

    const needsReply = tickets.filter(t => t.status === "open");
    const inProgress = tickets.filter(t => t.status === "in_progress");
    const closed = tickets.filter(t => t.status === "closed");
    document.getElementById("ticketStats").innerHTML = `
      <div class="stats">
        <div class="stat green"><div class="n">${needsReply.length}</div><div class="l">Needs a reply</div></div>
        <div class="stat blue"><div class="n">${inProgress.length}</div><div class="l">In progress</div></div>
        <div class="stat amber"><div class="n">${closed.length}</div><div class="l">Resolved</div></div>
      </div>`;
    renderTicketList();
  } catch (e) { list.innerHTML = `<div class="empty err">Failed: ${esc(e.message)}</div>`; }
}

function ticketRow(t) {
  const icon = t.category === "bug" ? "🐛" : t.category === "feature" ? "💡" : "💬";
  const sub = [t.name, fmtDate(t.created_at)].filter(Boolean).map(esc).join(" · ");
  return `
  <div class="card rowlink ${t.id === convoId ? "sel" : ""}" data-tid="${t.id}" style="padding:12px 14px;cursor:pointer" onclick="openConvo(${t.id})">
    <div class="summary">
      <span style="font-size:16px">${icon}</span>
      <div class="grow">
        <h3 style="font-size:13px">${esc(t.subject)}</h3>
        <span class="sub">${sub}</span>
      </div>
      ${t.admin_note ? '<span title="Has internal note">📌</span>' : ""}
      <span class="pill ${esc(t.status)}">${esc(t.status.replace("_", " "))}</span>
    </div>
  </div>`;
}

function renderTicketList() {
  const list = document.getElementById("ticketList");
  const q = ticketFilter.trim().toLowerCase();
  const match = t => !q || [t.subject, t.name, t.email, t.detail].some(v => String(v ?? "").toLowerCase().includes(q));
  const needsReply = LAST_TICKETS.filter(t => t.status === "open" && match(t));
  const inProgress = LAST_TICKETS.filter(t => t.status === "in_progress" && match(t));
  const closed = LAST_TICKETS.filter(t => t.status === "closed" && match(t));
  if (!LAST_TICKETS.length) { list.innerHTML = '<div class="empty">No tickets yet</div>'; return; }
  list.innerHTML =
    (needsReply.length ? '<h2 class="section" style="margin-top:0">Needs a reply</h2>' + needsReply.map(ticketRow).join("") : "") +
    (inProgress.length ? '<h2 class="section">In progress</h2>' + inProgress.map(ticketRow).join("") : "") +
    (closed.length ? '<h2 class="section">Resolved</h2>' + closed.map(ticketRow).join("") : "") +
    (!needsReply.length && !inProgress.length && !closed.length ? '<div class="empty">No tickets match your search</div>' : "");
}
// Free, offline reply templates. {name} becomes the user's first name
// (or "there" when we don't have one). Edit these to taste.
const TEMPLATES = [

  { label: "Need more info", text: "Hi {name}, thanks for getting in touch. To help us track this down, could you let us know what device you're using and roughly when the issue happened? Any extra detail helps a lot. You can reply right here in the app." },
  { label: "Feature idea, noted", text: "Hi {name}, thank you for the suggestion! We've added it to our feature list and we'll see if we can bring it to a future update. Ideas like this genuinely shape where the app goes next." },
  { label: "Can't reproduce", text: "Hi {name}, thanks for the report. We've tried to reproduce this on our end but haven't been able to so far. If it happens again, could you note what screen you were on and what you tapped just before? That would really help." },
  { label: "Resolved, thanks", text: "Hi {name}, this has now been resolved. Thank you again for taking the time to report it, and we hope the app is even better for you from here. If anything else comes up, don't hesitate to get in touch." },

// ── Full-screen conversation window (the ticket workspace) ───────────
let convoId = null;

function convoTicket() { return LAST_TICKETS.find(x => x.id === convoId); }

function applyConvoTemplate(sel) {
  if (sel.value === "" || convoId == null) return;
  const t = convoTicket();
  const name = (t?.name ?? "").trim().split(" ")[0] || "there";
  document.getElementById("convoDraft").value = TEMPLATES[Number(sel.value)].text.replaceAll("{name}", name);
  sel.value = "";
}

function renderConvoHeader() {
  const t = convoTicket();
  document.getElementById("convoTitle").textContent = t ? t.subject : "Ticket #" + convoId;
  const pill = document.getElementById("convoPill");
  pill.style.display = t ? "" : "none";
  pill.className = "pill " + (t ? t.status : "");
  pill.textContent = t ? t.status.replace("_", " ") : "";

  const actions = document.getElementById("convoActions");
  if (!t) { actions.innerHTML = ""; return; }
  actions.innerHTML = `
    <span class="sub" style="color:var(--text3);font-size:12px">${t.category === "bug" ? "🐛 Bug" : t.category === "feature" ? "💡 Feature idea" : "💬 Other"} · #${t.id}${t.email ? " · " + esc(t.email) : ""}${t.app_version ? " · v" + esc(t.app_version) : ""}</span>
    <span style="flex:1"></span>
    <input type="text" id="convoNote" placeholder="📌 Internal note (only you see this)…" value="${esc(t.admin_note ?? "")}" style="max-width:280px" onchange="saveConvoNote()">
    ${t.status === "open" ? `<button class="neutral" onclick="setConvoStatus('in_progress')">Mark in progress</button>` : ""}
    ${t.status !== "closed"
      ? `<button class="approve" onclick="resolveConvo()">Resolve${t.email ? " &amp; email" : ""}</button>`
      : `<button class="neutral" onclick="setConvoStatus('open')">Reopen</button>`}
    <button class="delete" onclick="deleteConvoTicket()">Delete</button>`;
}

function openConvo(id) {
  convoId = id;
  document.getElementById("convoDraft").value = "";
  document.getElementById("ticketPane").classList.add("open"); // mobile only
  document.querySelectorAll("#ticketList .card").forEach(c =>
    c.classList.toggle("sel", Number(c.dataset.tid) === id));
  renderConvoHeader();
  loadConvo();
}
function closeConvo() {
  document.getElementById("ticketPane").classList.remove("open");
}
async function setConvoStatus(status) {
  try {
    await api("updateTicket", { id: convoId, status });
    const t = convoTicket();
    if (t) t.status = status;
    renderConvoHeader();
    renderTicketList();
    toast(status === "in_progress" ? "Marked in progress" : "Reopened");
  } catch (e) { toast("Failed: " + e.message); }
}
async function resolveConvo() {
  const t = convoTicket();
  const msg = t?.email
    ? `Resolve this ticket? ${t.email} will get a resolution email including your latest reply.`
    : "Resolve this ticket? The user will see it as Resolved in the app.";
  if (!confirm(msg)) return;
  try {
    const r = await api("updateTicket", { id: convoId, status: "closed" });
    if (t) t.status = "closed";
    renderConvoHeader();
    renderTicketList();
    toast(r.emailed ? "Resolved, user emailed ✓" : "Resolved ✓ (no email on this ticket)");
  } catch (e) { toast("Failed: " + e.message); }
}
async function saveConvoNote() {
  try {
    const note = document.getElementById("convoNote").value;
    await api("updateTicket", { id: convoId, admin_note: note });
    const t = convoTicket();
    if (t) t.admin_note = note;
    toast("Note saved");
  } catch (e) { toast("Failed: " + e.message); }
}
async function deleteConvoTicket() {
  if (!confirm("Permanently delete this ticket and its conversation?")) return;
  try {
    await api("deleteTicket", { id: convoId });
    toast("Ticket deleted");
    convoId = null;
    document.getElementById("convoTitle").textContent = "Pick a ticket";
    document.getElementById("convoPill").style.display = "none";
    document.getElementById("convoActions").innerHTML = "";
    document.getElementById("convoMsgs").innerHTML = '<div class="empty">Select a ticket on the left to read and reply 👈</div>';
    closeConvo();
    loadTickets();
  } catch (e) { toast("Failed: " + e.message); }
}
async function loadConvo() {
  if (convoId == null) return;
  const el = document.getElementById("convoMsgs");
  el.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const t = LAST_TICKETS.find(x => x.id === convoId);
    const { messages } = await api("ticketThread", { id: convoId });
    let html = "";
    if (t) {
      html += `<div class="bubble user"><div class="who">${esc(t.name || "User")} · original report · ${fmtDate(t.created_at)}</div>${esc(t.detail)}</div>`;
    }
    html += messages.map(m => `
      <div class="bubble ${esc(m.sender)}">
        <div class="who">${m.sender === "admin" ? "You" : esc(t?.name || "User")} · ${fmtDate(m.created_at)}</div>${esc(m.text)}
      </div>`).join("");
    if (!messages.length) html += '<div class="empty" style="padding:16px 0">No replies yet. Say hello below 👇</div>';
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  } catch (e) { el.innerHTML = `<div class="empty err">Failed: ${esc(e.message)}</div>`; }
}
async function sendConvo() {
  const draft = document.getElementById("convoDraft");
  const text = draft.value.trim();
  if (!text || convoId == null) return;
  try {
    await api("adminReply", { id: convoId, text });
    draft.value = "";
    const t = convoTicket();
    if (t && t.status === "open") t.status = "in_progress";
    if (t) t.public_reply = text;
    renderConvoHeader();
    renderTicketList();
    loadConvo();
  } catch (e) { toast("Failed: " + e.message); }
}

// Copies the emails of everyone who opted into news, ready to paste into
// a newsletter tool's BCC/audience field.
function copySignupEmails() {
  const emails = [...new Set(LAST_SIGNUPS.filter(s => s.news_opt_in && s.email).map(s => s.email))];
  if (!emails.length) { toast("No newsletter opt-ins yet"); return; }
  navigator.clipboard.writeText(emails.join(", "))
    .then(() => toast(`Copied ${emails.length} newsletter email${emails.length === 1 ? "" : "s"} ✓`))
    .catch(() => toast("Couldn't access the clipboard"));
}
function downloadSignupsCSV() {
  if (!LAST_SIGNUPS.length) { toast("No signups yet"); return; }
  const cols = ["created_at", "first_name", "last_name", "email", "vehicle_name", "news_opt_in"];
  const cell = v => `"${String(v ?? "").replaceAll('"', '""')}"`;
  const csv = [cols.join(","), ...LAST_SIGNUPS.map(s => cols.map(c => cell(s[c])).join(","))].join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  a.download = `charge-nomad-signups-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast("CSV downloaded");
}

        <div class="details">
          <div class="body">${esc(n.text)}</div>
          <div class="meta" style="margin-top:8px">#${n.id} · ${fmtDate(n.created_at)}</div>
          ${kvBlock(n, ["id", "text", "created_at", "status"])}
        </div>
      </div>`).join("") : '<div class="empty">No notes</div>';
    el.innerHTML = html;
  } catch (e) { el.innerHTML = `<div class="empty err">Failed: ${esc(e.message)}</div>`; }
}
async function deleteContent(type, id) {
  if (!confirm(`Permanently delete this ${type}? This can't be undone.`)) return;
  await api("deleteContent", { type, id });
  toast("Deleted");
  loadContent();
}

// ── Boot ──────────────────────────────────────────────────────────────
if (SECRET) {
  document.getElementById("login").style.display = "none";
  refreshAll();
}
</script>
